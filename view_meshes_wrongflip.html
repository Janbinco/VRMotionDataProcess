<!DOCTYPE html>
<html>
<head>
    <title>Wrong Rotation Viewer</title>
    <style>
        body { margin: 0; background: #1a1a1a; font-family: Arial, sans-serif; color: white; }
        h1 { text-align: center; padding: 16px; margin: 0; background: #222; }
        .controls { text-align: center; padding: 6px; background: #222; color: #888; font-size: 12px; margin-bottom: 10px; }
        #container { padding: 10px; }

        .model-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            background: #2a2a2a;
            border-radius: 8px;
            padding: 8px;
            gap: 8px;
        }
        .model-name {
            width: 120px;
            min-width: 120px;
            font-size: 13px;
            font-weight: bold;
            color: #ccc;
            text-align: center;
            word-break: break-all;
        }
        .cell {
            width: 220px;
            height: 220px;
            position: relative;
            cursor: pointer;
            border-radius: 6px;
            overflow: hidden;
            background: #333;
            flex-shrink: 0;
        }
        .cell img {
            width: 220px;
            height: 220px;
            object-fit: contain;
            display: block;
        }
        .cell canvas {
            display: none;
            width: 220px;
            height: 220px;
        }
        .cell-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.5);
            text-align: center;
            font-size: 11px;
            color: #aaa;
            padding: 2px 0;
            pointer-events: none;
        }
        .cell:hover { outline: 2px solid #555; }
        .cell.mesh-active { outline: 2px solid #4af; }
    </style>
</head>
<body>
    <h1>Wrong Rotation Results</h1>
    <div class="controls">单击图片查看3D Mesh（拖拽旋转，滚轮缩放）&nbsp;|&nbsp;双击退出Mesh视图</div>
    <div id="container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const models = [
            'bladeLego',
            'cactus',
            'church',
            'defenseTower',
            'iceCreamShop',
            'standingApple',
        ];
        const INDICES = [1, 2, 3, 4, 5];
        const CELL_SIZE = 220;

        const viewerState = {}; // cellId -> { initialized, renderer, controls, animId }

        function showMesh(cell) {
            const img = cell.querySelector('img');
            const canvas = cell.querySelector('canvas');
            img.style.display = 'none';
            canvas.style.display = 'block';
            cell.classList.add('mesh-active');

            const cellId = cell.dataset.cellId;
            if (!viewerState[cellId]) {
                initViewer(cell);
            } else {
                // resume animation
                const state = viewerState[cellId];
                if (!state.animating) {
                    state.animating = true;
                    animate(cellId);
                }
            }
        }

        function showImage(cell) {
            const img = cell.querySelector('img');
            const canvas = cell.querySelector('canvas');
            img.style.display = 'block';
            canvas.style.display = 'none';
            cell.classList.remove('mesh-active');

            const cellId = cell.dataset.cellId;
            if (viewerState[cellId]) {
                viewerState[cellId].animating = false;
                cancelAnimationFrame(viewerState[cellId].animId);
            }
        }

        function animate(cellId) {
            const state = viewerState[cellId];
            if (!state || !state.animating) return;
            state.animId = requestAnimationFrame(() => animate(cellId));
            state.controls.update();
            state.renderer.render(state.scene, state.camera);
        }

        function initViewer(cell) {
            const modelName = cell.dataset.model;
            const index = cell.dataset.index;
            const cellId = cell.dataset.cellId;
            const canvas = cell.querySelector('canvas');

            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x333333);

            const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 1000);
            camera.position.set(0, 0, 2);

            const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(CELL_SIZE, CELL_SIZE);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight1.position.set(1, 1, 1);
            scene.add(dirLight1);
            const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.4);
            dirLight2.position.set(-1, -1, -1);
            scene.add(dirLight2);

            const controls = new THREE.OrbitControls(camera, canvas);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            const state = { scene, camera, renderer, controls, animating: true, animId: null };
            viewerState[cellId] = state;

            const basePath = `${modelName}/unityresults/wrongrotation/mesh_${index}`;
            const objPath = `${basePath}/lrm_mesh.obj`;
            const texturePath = `${basePath}/lrm_mesh.png`;

            const textureLoader = new THREE.TextureLoader();
            const texture = textureLoader.load(texturePath);
            texture.flipY = true;

            const objLoader = new THREE.OBJLoader();
            objLoader.load(objPath, function(obj) {
                obj.traverse(function(child) {
                    if (child instanceof THREE.Mesh) {
                        child.material = new THREE.MeshStandardMaterial({
                            map: texture,
                            metalness: 0.1,
                            roughness: 0.8,
                        });
                    }
                });
                const box = new THREE.Box3().setFromObject(obj);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 1.5 / maxDim;
                obj.scale.setScalar(scale);
                obj.position.sub(center.multiplyScalar(scale));
                scene.add(obj);
            });

            animate(cellId);
        }

        // Build the grid
        const container = document.getElementById('container');
        let cellCounter = 0;

        models.forEach(modelName => {
            const row = document.createElement('div');
            row.className = 'model-row';

            const nameDiv = document.createElement('div');
            nameDiv.className = 'model-name';
            nameDiv.textContent = modelName;
            row.appendChild(nameDiv);

            INDICES.forEach(index => {
                const cellId = 'cell-' + cellCounter++;
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.model = modelName;
                cell.dataset.index = index;
                cell.dataset.cellId = cellId;

                const imgPath = `${modelName}/unityresults/wrongrotation/${index}.png`;
                const img = document.createElement('img');
                img.src = imgPath;
                img.alt = `${modelName} ${index}`;

                const canvas = document.createElement('canvas');
                canvas.width = CELL_SIZE;
                canvas.height = CELL_SIZE;

                const label = document.createElement('div');
                label.className = 'cell-label';
                label.textContent = index;

                cell.appendChild(img);
                cell.appendChild(canvas);
                cell.appendChild(label);
                row.appendChild(cell);

                // single/double click detection
                let clickTimer = null;
                cell.addEventListener('click', () => {
                    if (clickTimer !== null) {
                        // second click within 300ms → double click
                        clearTimeout(clickTimer);
                        clickTimer = null;
                        showImage(cell);
                    } else {
                        clickTimer = setTimeout(() => {
                            clickTimer = null;
                            // only act if currently showing image
                            const canvas = cell.querySelector('canvas');
                            if (canvas.style.display === 'none' || canvas.style.display === '') {
                                showMesh(cell);
                            }
                        }, 300);
                    }
                });
            });

            container.appendChild(row);
        });
    </script>
</body>
</html>
