<!DOCTYPE html>
<html>
<head>
    <title>2 Flipped Viewer</title>
    <style>
        body { margin: 0; background: #1a1a1a; font-family: Arial, sans-serif; color: white; }
        h1 { text-align: center; padding: 16px; margin: 0; background: #222; }
        .controls { text-align: center; padding: 6px; background: #222; color: #888; font-size: 12px; margin-bottom: 10px; }
        #container { padding: 10px; }

        .model-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            background: #2a2a2a;
            border-radius: 8px;
            padding: 8px;
            gap: 8px;
        }
        .model-name {
            width: 120px;
            min-width: 120px;
            font-size: 13px;
            font-weight: bold;
            color: #ccc;
            text-align: center;
            word-break: break-all;
        }
        .cell {
            width: 220px;
            height: 220px;
            position: relative;
            cursor: pointer;
            border-radius: 6px;
            overflow: hidden;
            background: #333;
            flex-shrink: 0;
        }
        .cell img {
            width: 220px;
            height: 220px;
            object-fit: contain;
            display: block;
        }
        .cell canvas {
            display: none;
            width: 220px;
            height: 220px;
        }
        .cell-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.5);
            text-align: center;
            font-size: 11px;
            color: #aaa;
            padding: 2px 0;
            pointer-events: none;
        }
        .cell:hover { outline: 2px solid #555; }
        .cell.mesh-active { outline: 2px solid #4af; }
        .cell.gt-cell { outline: 2px solid #4a4; }
        .cell.gt-cell:hover { outline: 2px solid #6c6; }
        .cell.gt-cell.mesh-active { outline: 2px solid #4af; }
        .col-divider {
            width: 2px;
            min-width: 2px;
            height: 220px;
            background: #555;
            border-radius: 1px;
            flex-shrink: 0;
        }
        .cell.status-pass   { outline: 2px solid #4a4; }
        .cell.status-fail   { outline: 2px solid #c44; }
        .cell.status-partial{ outline: 2px solid #ca4; }
        .consistency-badge {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(0,0,0,0.72);
            border-radius: 4px;
            padding: 3px 5px;
            font-size: 10px;
            line-height: 1.5;
            color: #ddd;
            pointer-events: none;
            text-align: right;
        }
        .consistency-badge .badge-pass    { color: #5d5; font-weight: bold; }
        .consistency-badge .badge-lrfail  { color: #f66; font-weight: bold; }
        .consistency-badge .badge-fbfail  { color: #fa0; font-weight: bold; }
        .consistency-badge .badge-allfail { color: #f44; font-weight: bold; }
    </style>
</head>
<body>
    <h1>2 Flipped Results</h1>
    <div class="controls">Click to view 3D Mesh (drag to rotate, scroll to zoom)&nbsp;|&nbsp;Double-click to exit Mesh view</div>
    <div id="container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const models = [
            'bladeLego',
            'cactus',
            'church',
            'church_newprompt',
            'defenseTower',
            'iceCreamShop',
            'standingApple',
        ];

        const gtGlbNames = {
            bladeLego:        'BladeLego',
            cactus:           'cactus',
            church:           'church',
            church_newprompt: 'church',
            defenseTower:     'tower',
            iceCreamShop:     'icecreamShop',
            standingApple:    'StandingApple',
        };

        const gtFolderNames = {
            bladeLego:        'BladeLego',
            cactus:           'cactus',
            church:           'church',
            church_newprompt: 'church',
            defenseTower:     'tower',
            iceCreamShop:     'icecreamShop',
            standingApple:    'StandingApple',
        };

        // Models without generated meshes (image-only cells)
        const NO_MESH = new Set(['church_newprompt']);

        // Custom image base path (overrides default ${model}/unityresults/2flipped)
        const MODEL_IMG_BASE = {
            church_newprompt: 'church/unityresults/newPrompt',
        };

        // Custom sphere mask source
        const MODEL_MASK_SRC = {
            church_newprompt: 'church/parts_sphere_mask/sphere_composite_mask_flipped.png',
        };


        const MAX_INDEX = 6;
        const CELL_SIZE = 220;

        const MODEL_INDICES = {
            bladeLego:        [1, 2, 3, 4, 5],
            cactus:           [1, 2, 3, 4, 5],
            church:           [1, 2, 3, 4, 5, 6],
            church_newprompt: [1, 2, 3, 4, 5],
            defenseTower:     [1, 2, 3, 4, 5],
            iceCreamShop:     [1, 2, 3, 4, 5],
            standingApple:    [1, 2, 3, 4, 5],
        };

        const consistencyData = {
            bladeLego: {
                1: { lr_iou: 0.558, fb_iou: 0.655, status: 'ALL-fail' },
                2: { lr_iou: 0.921, fb_iou: 0.925, status: 'PASS' },
                3: { lr_iou: 0.702, fb_iou: 0.811, status: 'LR-fail' },
                4: { lr_iou: 0.951, fb_iou: 0.952, status: 'PASS' },
                5: { lr_iou: 0.941, fb_iou: 0.937, status: 'PASS' },
            },
            cactus: {
                1: { lr_iou: 0.965, fb_iou: 0.957, status: 'PASS' },
                2: { lr_iou: 1.000, fb_iou: 1.000, status: 'PASS' },
                3: { lr_iou: 0.957, fb_iou: 0.964, status: 'PASS' },
                4: { lr_iou: 1.000, fb_iou: 1.000, status: 'PASS' },
                5: { lr_iou: 1.000, fb_iou: 1.000, status: 'PASS' },
            },
            church: {
                1: { lr_iou: 0.000, fb_iou: 0.000, status: 'ALL-fail' },
                2: { lr_iou: 0.833, fb_iou: 0.879, status: 'PASS' },
                3: { lr_iou: 0.841, fb_iou: 0.575, status: 'FB-fail' },
                4: { lr_iou: 0.000, fb_iou: 0.000, status: 'ALL-fail' },
                5: { lr_iou: 0.889, fb_iou: 0.753, status: 'FB-fail' },
                6: { lr_iou: 0.969, fb_iou: 0.746, status: 'FB-fail' },
            },
            defenseTower: {
                1: { lr_iou: 0.938, fb_iou: 0.896, status: 'PASS' },
                2: { lr_iou: 0.916, fb_iou: 0.948, status: 'PASS' },
                3: { lr_iou: 0.928, fb_iou: 0.909, status: 'PASS' },
                4: { lr_iou: 0.919, fb_iou: 0.953, status: 'PASS' },
                5: { lr_iou: 0.973, fb_iou: 0.967, status: 'PASS' },
            },
            iceCreamShop: {
                1: { lr_iou: 1.000, fb_iou: 1.000, status: 'PASS' },
                2: { lr_iou: 1.000, fb_iou: 1.000, status: 'PASS' },
                3: { lr_iou: 1.000, fb_iou: 1.000, status: 'PASS' },
                4: { lr_iou: 1.000, fb_iou: 1.000, status: 'PASS' },
                5: { lr_iou: 0.858, fb_iou: 0.812, status: 'PASS' },
            },
            standingApple: {
                1: { lr_iou: 0.971, fb_iou: 0.952, status: 'PASS' },
                2: { lr_iou: 0.963, fb_iou: 0.800, status: 'FB-fail' },
                3: { lr_iou: 0.977, fb_iou: 0.972, status: 'PASS' },
                4: { lr_iou: 0.960, fb_iou: 0.943, status: 'PASS' },
                5: { lr_iou: 0.970, fb_iou: 0.947, status: 'PASS' },
            },
            church_newprompt: {
                1: { lr_iou: 0.955, fb_iou: 0.955, status: 'PASS' },
                2: { lr_iou: 0.903, fb_iou: 0.876, status: 'PASS' },
                3: { lr_iou: 0.940, fb_iou: 0.927, status: 'PASS' },
                4: { lr_iou: 0.941, fb_iou: 0.485, status: 'FB-fail' },
                5: { lr_iou: 0.945, fb_iou: 0.979, status: 'PASS' },
            },
        };

        const viewerState = {};

        function showMesh(cell) {
            const img = cell.querySelector('img');
            const canvas = cell.querySelector('canvas');
            img.style.display = 'none';
            canvas.style.display = 'block';
            cell.classList.add('mesh-active');

            const cellId = cell.dataset.cellId;
            if (!viewerState[cellId]) {
                initViewer(cell);
            } else {
                const state = viewerState[cellId];
                if (!state.animating) {
                    state.animating = true;
                    animate(cellId);
                }
            }
        }

        function showImage(cell) {
            const img = cell.querySelector('img');
            const canvas = cell.querySelector('canvas');
            img.style.display = 'block';
            canvas.style.display = 'none';
            cell.classList.remove('mesh-active');

            const cellId = cell.dataset.cellId;
            if (viewerState[cellId]) {
                viewerState[cellId].animating = false;
                cancelAnimationFrame(viewerState[cellId].animId);
            }
        }

        function animate(cellId) {
            const state = viewerState[cellId];
            if (!state || !state.animating) return;
            state.animId = requestAnimationFrame(() => animate(cellId));
            state.controls.update();
            state.renderer.render(state.scene, state.camera);
        }

        function buildScene(canvas) {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x333333);

            const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 1000);
            camera.position.set(0, 0, 2);

            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(CELL_SIZE, CELL_SIZE);

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const d1 = new THREE.DirectionalLight(0xffffff, 0.8);
            d1.position.set(1, 1, 1);
            scene.add(d1);
            const d2 = new THREE.DirectionalLight(0xffffff, 0.4);
            d2.position.set(-1, -1, -1);
            scene.add(d2);

            const controls = new THREE.OrbitControls(camera, canvas);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            return { scene, camera, renderer, controls };
        }

        function addObjToScene(obj, scene) {
            const box = new THREE.Box3().setFromObject(obj);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 1.5 / maxDim;
            obj.scale.setScalar(scale);
            obj.position.sub(center.multiplyScalar(scale));
            scene.add(obj);
        }

        function initViewer(cell) {
            const modelName = cell.dataset.model;
            const cellId = cell.dataset.cellId;
            const canvas = cell.querySelector('canvas');
            const isGt = cell.dataset.isgt === 'true';

            const { scene, camera, renderer, controls } = buildScene(canvas);
            const state = { scene, camera, renderer, controls, animating: true, animId: null };
            viewerState[cellId] = state;

            if (isGt) {
                const glbName = cell.dataset.glbname;
                const loader = new THREE.GLTFLoader();
                loader.load(`GT/${glbName}.glb`, function(gltf) {
                    addObjToScene(gltf.scene, scene);
                });
            } else {
                const index = cell.dataset.index;
                const basePath = `${modelName}/unityresults/2flipped/mesh_${index}`;
                const texture = new THREE.TextureLoader().load(`${basePath}/lrm_mesh.png`);
                texture.flipY = true;

                const objLoader = new THREE.OBJLoader();
                objLoader.load(`${basePath}/lrm_mesh.obj`, function(obj) {
                    obj.traverse(function(child) {
                        if (child instanceof THREE.Mesh) {
                            child.material = new THREE.MeshStandardMaterial({
                                map: texture,
                                metalness: 0.1,
                                roughness: 0.8,
                            });
                        }
                    });
                    addObjToScene(obj, scene);
                });
            }

            animate(cellId);
        }

        function makeClickHandler(cell) {
            let clickTimer = null;
            cell.addEventListener('click', () => {
                if (clickTimer !== null) {
                    clearTimeout(clickTimer);
                    clickTimer = null;
                    showImage(cell);
                } else {
                    clickTimer = setTimeout(() => {
                        clickTimer = null;
                        const canvas = cell.querySelector('canvas');
                        if (canvas.style.display === 'none' || canvas.style.display === '') {
                            showMesh(cell);
                        }
                    }, 300);
                }
            });
        }

        // Build the grid
        const container = document.getElementById('container');
        let cellCounter = 0;

        // --- Header row ---
        const headerRow = document.createElement('div');
        headerRow.style.cssText = 'display:flex;align-items:center;padding:0 8px 4px 8px;gap:8px;';
        [
            { label: 'Model',         width: '120px' },
            { label: 'Ground Truth',  width: '220px' },
            { label: 'Unity Tracing', width: '220px' },
            { label: '',              width: '2px'   },  // divider spacer
            ...[...Array(MAX_INDEX).keys()].map(i => ({ label: `Test ${i+1}`, width: '220px' })),
        ].forEach(col => {
            const h = document.createElement('div');
            h.style.cssText = `width:${col.width};min-width:${col.width};text-align:center;font-size:12px;font-weight:bold;color:#888;flex-shrink:0;`;
            h.textContent = col.label;
            headerRow.appendChild(h);
        });
        container.appendChild(headerRow);

        models.forEach(modelName => {
            const row = document.createElement('div');
            row.className = 'model-row';

            const nameDiv = document.createElement('div');
            nameDiv.className = 'model-name';
            nameDiv.textContent = modelName;
            row.appendChild(nameDiv);

            // --- GT cell ---
            const gtCellId = 'cell-' + cellCounter++;
            const gtCell = document.createElement('div');
            gtCell.className = 'cell gt-cell';
            gtCell.dataset.model = modelName;
            gtCell.dataset.cellId = gtCellId;
            gtCell.dataset.isgt = 'true';
            gtCell.dataset.glbname = gtGlbNames[modelName];

            const gtImg = document.createElement('img');
            gtImg.src = `GT/${gtFolderNames[modelName]}/2x2_glb.png`;
            gtImg.alt = `${modelName} GT`;

            const gtCanvas = document.createElement('canvas');
            gtCanvas.width = CELL_SIZE;
            gtCanvas.height = CELL_SIZE;

            const gtLabel = document.createElement('div');
            gtLabel.className = 'cell-label';
            gtLabel.textContent = 'GT';

            gtCell.appendChild(gtImg);
            gtCell.appendChild(gtCanvas);
            gtCell.appendChild(gtLabel);
            row.appendChild(gtCell);
            makeClickHandler(gtCell);

            // --- sphere mask cell (second column) ---
            const maskCell = document.createElement('div');
            maskCell.className = 'cell';
            maskCell.style.cursor = 'default';

            const maskImg = document.createElement('img');
            maskImg.src = MODEL_MASK_SRC[modelName] || `${modelName}/parts_sphere_mask/sphere_composite_mask_flipped.png`;
            maskImg.alt = `${modelName} sphere mask`;

            const maskLabel = document.createElement('div');
            maskLabel.className = 'cell-label';
            maskLabel.textContent = 'sphere mask';

            maskCell.appendChild(maskImg);
            maskCell.appendChild(maskLabel);
            row.appendChild(maskCell);

            // --- divider ---
            const divider = document.createElement('div');
            divider.className = 'col-divider';
            row.appendChild(divider);

            // --- prediction cells ---
            const modelIndices = MODEL_INDICES[modelName] || [];
            for (let index = 1; index <= MAX_INDEX; index++) {
                if (!modelIndices.includes(index)) {
                    const ph = document.createElement('div');
                    ph.style.cssText = `width:${CELL_SIZE}px;min-width:${CELL_SIZE}px;height:${CELL_SIZE}px;flex-shrink:0;`;
                    row.appendChild(ph);
                    continue;
                }

                const cellId = 'cell-' + cellCounter++;
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.model = modelName;
                cell.dataset.index = index;
                cell.dataset.cellId = cellId;
                cell.dataset.isgt = 'false';

                const img = document.createElement('img');
                const imgBase = MODEL_IMG_BASE[modelName] || `${modelName}/unityresults/2flipped`;
                img.src = `${imgBase}/${index}.png`;
                img.alt = `${modelName} ${index}`;

                const canvas = document.createElement('canvas');
                canvas.width = CELL_SIZE;
                canvas.height = CELL_SIZE;
                if (NO_MESH.has(modelName)) canvas.style.display = 'none';

                const label = document.createElement('div');
                label.className = 'cell-label';
                label.textContent = index;

                // consistency badge
                const cd = (consistencyData[modelName] || {})[index];
                if (cd) {
                    const statusClass = cd.status === 'PASS' ? 'badge-pass'
                                      : cd.status === 'LR-fail' ? 'badge-lrfail'
                                      : cd.status === 'FB-fail' ? 'badge-fbfail'
                                      : 'badge-allfail';
                    cell.classList.add(cd.status === 'PASS' ? 'status-pass'
                                      : cd.status === 'LR-fail' || cd.status === 'FB-fail' ? 'status-partial'
                                      : 'status-fail');

                    const badge = document.createElement('div');
                    badge.className = 'consistency-badge';
                    badge.innerHTML =
                        `LR: ${cd.lr_iou.toFixed(3)}<br>` +
                        `FB: ${cd.fb_iou.toFixed(3)}<br>` +
                        `<span class="${statusClass}">${cd.status}</span>`;
                    cell.appendChild(badge);
                }

                cell.appendChild(img);
                cell.appendChild(canvas);
                cell.appendChild(label);
                row.appendChild(cell);
                if (!NO_MESH.has(modelName)) makeClickHandler(cell);
                else cell.style.cursor = 'default';
            }

            container.appendChild(row);
        });
    </script>
</body>
</html>
